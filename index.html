<!DOCTYPE html>

<html>
<head>
  <title>Receipt Generator</title>

  <!-- Malayalam Fonts -->

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam&family=Noto+Serif+Malayalam&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Sans Malayalam', sans-serif;
      text-align: center;
      background: #f2f2f2;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 260px;
      margin: 8px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .receipt {
      margin-top: 20px;
      display: none;
    }

    .receipt b {
      font-family: 'Noto Serif Malayalam', serif;
      font-size: 15px;
      color: black;
    }

    #receiptArea {
      position: relative;
      display: inline-block;
    }

    img {
      width: 400px;
      max-width: 95%;
    }

    #previewArea {
      margin-top: 20px;
    }
  </style>

</head>

<body>

<h2>വിശദാംശങ്ങൾ നൽകുക</h2>

<input id="name" placeholder="പേര്"><br> <input id="house" placeholder="വീട് പേര്"><br> <input id="star" placeholder="നക്ഷത്രം"><br>

<button onclick="generateReceipt()">Generate</button>

<div class="receipt" id="receipt">

  <div id="receiptArea">

```
<!-- Make sure this file exists -->
<img src="receipt.jpg">

<!-- NAME -->
<div style="position:absolute; top:175px; left:85px;">
  <b id="rname"></b>
</div>

<!-- HOUSE -->
<div style="position:absolute; top:210px; left:85px;">
  <b id="rhouse"></b>
</div>

<!-- STAR -->
<div style="position:absolute; top:195px; left:255px;">
  <b id="rstar"></b>
</div>

<!-- DATE -->
<div style="position:absolute; top:115px; left:315px;">
  <b id="date"></b>
</div>
```

  </div>

<button onclick="downloadReceipt()">Download Receipt</button>

</div>

<div id="previewArea"></div>

<!-- Library -->

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function generateReceipt() {

  let name = document.getElementById("name").value;
  let house = document.getElementById("house").value;
  let star = document.getElementById("star").value;

  if(name === "" || house === "" || star === ""){
    alert("Please fill all fields!");
    return;
  }

  document.getElementById("rname").innerText = name;
  document.getElementById("rhouse").innerText = house;
  document.getElementById("rstar").innerText = star;

  document.getElementById("date").innerText =
    new Date().toLocaleDateString("ml-IN");

  document.getElementById("receipt").style.display = "block";
}

function downloadReceipt(){

  html2canvas(document.getElementById("receiptArea")).then(canvas => {

    let img = canvas.toDataURL("image/png");

    // Clear previous preview
    document.getElementById("previewArea").innerHTML = "";

    // Show preview
    let preview = document.createElement("img");
    preview.src = img;
    preview.style.width = "300px";
    preview.style.display = "block";
    preview.style.margin = "20px auto";

    document.getElementById("previewArea").appendChild(preview);

    // Download button
    let btn = document.createElement("button");
    btn.innerText = "Click here to Download";
    btn.onclick = function(){
      let link = document.createElement("a");
      link.href = img;
      link.download = "receipt.png";
      link.click();
    };

    document.getElementById("previewArea").appendChild(btn);

  });

}

</script>

</body>
</html>
